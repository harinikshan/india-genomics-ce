<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ report_name }} — Genetic Health</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #0c2d48;
            --primary-light: #2e86ab;
            --accent: #00b894;
            --text: #1a1a2e;
        }
        * { box-sizing: border-box; }
        body {
            background: #f0f2f5;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
        }

        .preview-header {
            background: linear-gradient(135deg, var(--primary) 0%, #145374 50%, var(--primary-light) 100%);
            padding: 0.8rem 0;
            color: white;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .preview-header h1 {
            font-size: 0.95rem;
            font-weight: 600;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 400px;
        }
        .btn-actions {
            display: flex;
            gap: 0.4rem;
            flex-shrink: 0;
        }
        .btn-actions .btn {
            font-size: 0.8rem;
            padding: 0.3rem 0.7rem;
            font-weight: 500;
            border-radius: 6px;
        }

        .content-wrapper {
            max-width: 880px;
            margin: 1.5rem auto 3rem;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.06);
            padding: 2.5rem 3rem;
            border: 1px solid rgba(0,0,0,0.04);
        }

        /* ── Markdown styles ── */
        .content-wrapper h1 {
            color: var(--primary);
            font-weight: 800;
            font-size: 1.7rem;
            border-bottom: 3px solid var(--accent);
            padding-bottom: 0.5rem;
            margin-bottom: 1.2rem;
            letter-spacing: -0.3px;
        }
        .content-wrapper h2 {
            color: var(--primary);
            font-weight: 700;
            font-size: 1.3rem;
            margin-top: 2rem;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 0.4rem;
        }
        .content-wrapper h3 {
            color: var(--text);
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 1.5rem;
        }
        .content-wrapper h4 {
            color: #6c757d;
            font-weight: 600;
            font-size: 0.95rem;
        }
        .content-wrapper table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.88rem;
            border-radius: 8px;
            overflow: hidden;
        }
        .content-wrapper th {
            background: var(--primary);
            color: white;
            padding: 0.55rem 0.75rem;
            text-align: left;
            font-weight: 600;
            font-size: 0.82rem;
        }
        .content-wrapper td {
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid #f0f0f0;
        }
        .content-wrapper tr:nth-child(even) td {
            background: #f8f9fb;
        }
        .content-wrapper tr:hover td {
            background: rgba(0,184,148,0.04);
        }
        .content-wrapper strong { color: var(--text); }
        .content-wrapper code {
            background: #f0f4f8;
            color: #e74c3c;
            padding: 0.12rem 0.35rem;
            border-radius: 4px;
            font-size: 0.88em;
        }
        .content-wrapper pre {
            background: #1a1a2e;
            color: #e2e8f0;
            padding: 1.5rem;
            border-radius: 10px;
            overflow-x: auto;
            font-size: 0.8rem;
            line-height: 1.6;
        }
        .content-wrapper pre code {
            background: none;
            color: inherit;
            padding: 0;
        }
        .content-wrapper blockquote {
            border-left: 4px solid var(--accent);
            padding: 0.6rem 1.2rem;
            margin: 1rem 0;
            background: rgba(0, 184, 148, 0.04);
            color: #636e72;
            border-radius: 0 8px 8px 0;
        }
        .content-wrapper hr {
            border: none;
            border-top: 2px solid #f0f0f0;
            margin: 2rem 0;
        }
        .content-wrapper ul, .content-wrapper ol {
            padding-left: 1.5rem;
        }
        .content-wrapper li {
            margin-bottom: 0.3rem;
            line-height: 1.65;
        }
        .content-wrapper p {
            line-height: 1.7;
        }

        @media print {
            .preview-header { display: none !important; }
            .content-wrapper {
                box-shadow: none;
                border: none;
                margin: 0;
                padding: 1rem;
                max-width: 100%;
                border-radius: 0;
            }
        }
        @media (max-width: 768px) {
            .content-wrapper { margin: 0.75rem; padding: 1.5rem; }
            .preview-header h1 { max-width: 180px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <header class="preview-header">
        <div class="container d-flex align-items-center justify-content-between">
            <h1><i class="bi bi-file-earmark-text me-2"></i>{{ report_name }}</h1>
            <div class="btn-actions">
                <a href="/download/{{ job_id }}/{{ report_name }}" class="btn btn-sm btn-outline-light">
                    <i class="bi bi-download me-1"></i>Download
                </a>
                <button onclick="window.print()" class="btn btn-sm btn-outline-light">
                    <i class="bi bi-printer me-1"></i>Print
                </button>
                <button onclick="history.back()" class="btn btn-sm btn-outline-light">
                    <i class="bi bi-arrow-left me-1"></i>Back
                </button>
            </div>
        </div>
    </header>

    <div class="content-wrapper" id="content">
        <div class="text-center text-muted py-5">
            <div class="spinner-border" role="status"></div>
            <p class="mt-2" style="font-size:0.9rem">Rendering report...</p>
        </div>
    </div>

    <script>
        const md = {{ markdown_content | tojson }};
        document.getElementById('content').innerHTML = marked.parse(md);
    </script>
</body>
</html>
